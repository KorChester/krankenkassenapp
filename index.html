<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MusterKasse – Ihre Online-Geschäftsstelle</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-900: #0A1F3D;
    --brand-800: #0B2A56;
    --brand-700: #0E3A75;
    --brand-600: #124A96;
    --brand-500: #1B5FB5;
    --brand-100: #E8EFF9;
    --brand-50:  #F4F7FC;

    --sage-600: #3F7D5A;
    --sage-500: #4F9A6E;
    --sage-100: #E6F2EB;

    --amber-600: #B4770E;
    --amber-100: #FCF1DC;

    --rose-600:  #B84454;
    --rose-100:  #FBE8EA;

    --ink-900: #0C1521;
    --ink-700: #2C3848;
    --ink-500: #5A6879;
    --ink-400: #8B96A5;
    --ink-300: #C2CAD4;
    --ink-200: #E4E8EE;
    --ink-100: #F1F3F7;
    --ink-50:  #F8FAFC;
  }

  * { -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 10% -10%, #dfe8f5 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 110%, #e3eadf 0%, transparent 60%),
      #eef1f6;
    color: var(--ink-900);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .serif { font-family: 'Instrument Serif', ui-serif, Georgia, serif; letter-spacing: -0.01em; }

  /* ---------- Phone shell ---------- */
  .phone-shell {
    width: 100%;
    max-width: 420px;
    height: min(900px, 94vh);
    background: #fff;
    border-radius: 44px;
    box-shadow:
      0 40px 80px -20px rgba(12, 21, 33, 0.35),
      0 12px 32px -8px rgba(12, 21, 33, 0.18),
      0 0 0 10px #0C1521,
      0 0 0 11px #1a2636;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .phone-notch {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 28px;
    background: #0C1521;
    border-radius: 20px;
    z-index: 60;
  }

  /* status bar */
  .status-bar {
    flex: 0 0 auto;
    height: 44px;
    padding: 0 28px 0 28px;
    display: flex; align-items: flex-end; justify-content: space-between;
    font-size: 13px; font-weight: 600;
    color: var(--ink-900);
    padding-bottom: 6px;
    background: transparent;
  }

  /* app header */
  .app-header {
    flex: 0 0 auto;
    padding: 10px 20px 14px 20px;
    background: #fff;
    position: relative;
    z-index: 10;
  }

  /* content scrollable */
  .app-content {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--ink-50);
    scrollbar-width: thin;
    scroll-behavior: smooth;
  }
  .app-content::-webkit-scrollbar { width: 0px; }

  /* bottom tab bar */
  .tab-bar {
    flex: 0 0 auto;
    height: 76px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(150%) blur(14px);
    -webkit-backdrop-filter: saturate(150%) blur(14px);
    border-top: 1px solid var(--ink-200);
    padding: 8px 4px 18px 4px;
    position: relative;
    z-index: 20;
  }
  .tab-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px;
    font-size: 10.5px; font-weight: 500;
    color: var(--ink-400);
    transition: color .18s ease, transform .18s ease;
    position: relative;
  }
  .tab-btn:active { transform: scale(0.94); }
  .tab-btn.active { color: var(--brand-700); }
  .tab-btn.active::before {
    content: "";
    position: absolute;
    top: -8px;
    width: 24px; height: 3px;
    border-radius: 99px;
    background: var(--brand-600);
  }
  .tab-btn .badge {
    position: absolute; top: -2px; right: calc(50% - 18px);
    min-width: 16px; height: 16px; padding: 0 4px;
    background: var(--rose-600); color: #fff;
    border-radius: 99px; font-size: 9.5px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #fff;
  }

  /* ---------- Cards ---------- */
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 1px 2px rgba(12,21,33,.04), 0 4px 14px -6px rgba(12,21,33,.08);
    border: 1px solid rgba(12,21,33,0.04);
  }
  .card-flat { background: #fff; border-radius: 14px; border: 1px solid var(--ink-200); }

  /* eGK card */
  .egk {
    position: relative;
    border-radius: 20px;
    padding: 22px 22px 20px 22px;
    color: #fff;
    overflow: hidden;
    background:
      radial-gradient(140% 120% at 0% 0%, #1B5FB5 0%, #0E3A75 40%, #0A1F3D 100%);
    box-shadow: 0 20px 40px -18px rgba(10, 31, 61, 0.55), 0 4px 10px -4px rgba(10,31,61,.25);
  }
  .egk::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(500px 200px at 110% -20%, rgba(255,255,255,.18), transparent 50%),
      radial-gradient(300px 150px at -10% 120%, rgba(79,154,110,.35), transparent 60%);
    pointer-events: none;
  }
  .egk-pattern {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.9;
  }
  .egk-chip {
    width: 36px; height: 28px; border-radius: 5px;
    background: linear-gradient(135deg, #D9C48C, #B69754 60%, #8E7336);
    position: relative;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.12);
  }
  .egk-chip::before, .egk-chip::after {
    content:""; position:absolute; background: rgba(0,0,0,.15);
  }
  .egk-chip::before { top:6px; left:3px; right:3px; height:1px; box-shadow: 0 5px 0 rgba(0,0,0,.15), 0 10px 0 rgba(0,0,0,.15); }
  .egk-chip::after  { top:3px; bottom:3px; left:14px; width:1px; }

  /* Quick action tile */
  .quick {
    background: #fff;
    border-radius: 14px;
    padding: 14px 12px 12px 12px;
    border: 1px solid var(--ink-200);
    display: flex; flex-direction: column; gap: 10px;
    align-items: flex-start; justify-content: space-between;
    min-height: 96px;
    transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease;
    text-align: left;
  }
  .quick:active { transform: scale(0.97); }
  .quick:hover { border-color: var(--brand-500); box-shadow: 0 6px 18px -8px rgba(18,74,150,.35); }
  .quick .ico {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--brand-50);
    color: var(--brand-700);
    display: flex; align-items: center; justify-content: center;
  }

  /* Status chips */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600;
    padding: 4px 9px; border-radius: 99px;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .chip-blue  { background: var(--brand-100); color: var(--brand-700); border-color: #CDDBF2; }
  .chip-green { background: var(--sage-100); color: var(--sage-600); border-color: #CDE3D5; }
  .chip-amber { background: var(--amber-100); color: var(--amber-600); border-color: #F0DDB4; }
  .chip-rose  { background: var(--rose-100); color: var(--rose-600); border-color: #F2CDD1; }
  .chip-gray  { background: var(--ink-100); color: var(--ink-700); border-color: var(--ink-200); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; font-weight: 600; font-size: 14px;
    padding: 12px 16px; border-radius: 12px;
    transition: transform .12s ease, background .2s ease, box-shadow .2s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--brand-700); color: #fff;
    box-shadow: 0 6px 16px -6px rgba(14,58,117,.55);
  }
  .btn-primary:hover { background: var(--brand-800); }
  .btn-ghost { background: var(--ink-100); color: var(--ink-900); }
  .btn-ghost:hover { background: var(--ink-200); }
  .btn-outline { background: #fff; color: var(--brand-700); border: 1px solid var(--brand-500); }
  .btn-outline:hover { background: var(--brand-50); }

  /* Sections */
  .section-title {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 4px 8px 4px;
  }
  .section-title h3 {
    font-size: 14px; font-weight: 600; color: var(--ink-700);
    letter-spacing: -0.01em;
  }
  .link { font-size: 13px; color: var(--brand-700); font-weight: 500; }
  .link:hover { text-decoration: underline; }

  /* List items */
  .li-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--ink-100);
  }
  .li-row:last-child { border-bottom: none; }
  .li-row .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--brand-50); color: var(--brand-700);
    font-weight: 600; font-size: 14px;
    flex: 0 0 auto;
  }

  /* Toast */
  .toast-wrap {
    position: absolute;
    top: 54px; left: 50%; transform: translateX(-50%);
    z-index: 80;
    display: flex; flex-direction: column; gap: 8px;
    width: min(92%, 380px);
    pointer-events: none;
  }
  .toast {
    background: #0C1521; color: #fff;
    padding: 11px 14px; border-radius: 12px;
    font-size: 13.5px; font-weight: 500;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 12px 28px -10px rgba(0,0,0,.35);
    animation: toast-in .28s ease-out;
    pointer-events: auto;
  }
  .toast.success { background: var(--sage-600); }
  .toast.info    { background: var(--brand-700); }
  .toast.warn    { background: var(--amber-600); }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Modal / Sheet */
  .sheet-backdrop {
    position: absolute; inset: 0; z-index: 70;
    background: rgba(12,21,33,.45);
    backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center;
    animation: fade-in .2s ease;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .sheet {
    background: #fff;
    width: 100%;
    max-height: 86%;
    border-radius: 22px 22px 0 0;
    overflow: hidden;
    display: flex; flex-direction: column;
    animation: sheet-up .28s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes sheet-up {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .sheet-handle {
    width: 44px; height: 4px; border-radius: 99px;
    background: var(--ink-200);
    margin: 10px auto 4px auto;
  }

  /* Inputs */
  .inp {
    width: 100%;
    padding: 11px 13px;
    background: var(--ink-50);
    border: 1px solid var(--ink-200);
    border-radius: 11px;
    font-size: 14px;
    color: var(--ink-900);
    transition: border-color .18s ease, background .18s ease;
  }
  .inp:focus {
    outline: none;
    border-color: var(--brand-500);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(27,95,181,.12);
  }
  .lbl { font-size: 12.5px; font-weight: 500; color: var(--ink-700); margin-bottom: 6px; display: block; }

  /* Timeline */
  .tl { position: relative; padding-left: 22px; }
  .tl::before {
    content:""; position: absolute; left: 8px; top: 6px; bottom: 6px;
    width: 2px; background: var(--ink-200);
  }
  .tl-item { position: relative; padding-bottom: 14px; }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-dot {
    position: absolute; left: -18px; top: 3px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; border: 2px solid var(--ink-300);
  }
  .tl-item.done .tl-dot     { background: var(--sage-500); border-color: var(--sage-500); }
  .tl-item.current .tl-dot  { background: var(--brand-600); border-color: var(--brand-600); box-shadow: 0 0 0 4px var(--brand-100); }

  /* Animated view switch */
  .view { animation: view-in .22s ease-out; }
  @keyframes view-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Notifications dropdown */
  .notif-pop {
    position: absolute;
    top: 100px; right: 16px; z-index: 65;
    width: 300px; max-height: 360px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 16px 40px -10px rgba(12,21,33,.28), 0 0 0 1px var(--ink-200);
    overflow: hidden;
    animation: pop-in .18s ease-out;
  }

  /* Versicherten-Switcher-Popover */
  .vers-switcher-pop {
    position: absolute;
    top: 100px; left: 16px; z-index: 65;
    width: 300px; max-height: 400px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 16px 40px -10px rgba(12,21,33,.28), 0 0 0 1px var(--ink-200);
    overflow: hidden;
    animation: pop-in .18s ease-out;
  }
  .vers-switcher-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    width: 100%;
    text-align: left;
    transition: background .15s ease;
    border-bottom: 1px solid var(--ink-100);
  }
  .vers-switcher-item:hover { background: var(--ink-50); }
  .vers-switcher-item:last-child { border-bottom: none; }
  .vers-switcher-item.active { background: var(--brand-50); }
  .vers-switcher-item .mini-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #fff;
    flex: 0 0 auto;
  }

  /* Loading-Overlay */
  .loading-overlay {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
    z-index: 90;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px;
    animation: fade-in .2s ease;
  }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--ink-200);
    border-top-color: var(--brand-600);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes pop-in {
    from { opacity: 0; transform: translateY(-6px) scale(.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .divider { height: 1px; background: var(--ink-100); }

  .num-mask { font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }

  .chip-amber [data-lucide="loader-circle"],
  .chip-amber svg.lucide-loader-circle {
    animation: spin 1.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes pulse-in {
    from { opacity: 0; transform: translateX(-50%) translateY(-6px) scale(0.9); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  }

  /* Mobile fallback: wenn wirklich klein, Rand weg */
  @media (max-width: 480px) {
    body { padding: 0 !important; background: #0C1521; }
    .phone-shell {
      max-width: 100%;
      height: 100vh; /* Fallback */
      height: 100dvh; /* berücksichtigt dynamische Browser-UI */
      border-radius: 0;
      box-shadow: none;
    }
    .phone-notch { display: none; }
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6">

<main id="app" class="phone-shell">
  <div class="phone-notch"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span id="clock">09:41</span>
    <div class="flex items-center gap-1.5">
      <i data-lucide="signal" class="w-3.5 h-3.5"></i>
      <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
      <span class="flex items-center gap-1">
        <span class="text-[11px] font-semibold">87%</span>
        <i data-lucide="battery-medium" class="w-4 h-4"></i>
      </span>
    </div>
  </div>

  <!-- App header -->
  <header class="app-header">
    <div class="flex items-start justify-between">
      <button id="userSwitcher" onclick="toggleVersSwitcher()" class="flex items-start gap-2 text-left group">
        <div>
          <div class="text-[11.5px] text-[var(--ink-500)] font-medium tracking-wide uppercase">Guten Tag</div>
          <h1 class="serif text-[26px] leading-tight mt-0.5 flex items-center gap-1.5">
            <span id="userName">Max <span class="italic text-[var(--brand-700)]">Mustermann</span></span>
            <i data-lucide="chevron-down" class="w-5 h-5 text-[var(--ink-400)] group-hover:text-[var(--brand-700)] transition"></i>
          </h1>
        </div>
      </button>
      <button id="notifBtn" class="relative w-10 h-10 rounded-full bg-[var(--ink-100)] hover:bg-[var(--ink-200)] flex items-center justify-center transition-colors" aria-label="Benachrichtigungen">
        <i data-lucide="bell" class="w-5 h-5 text-[var(--ink-700)]"></i>
        <span id="notifBadge" class="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] px-1 bg-[var(--rose-600)] text-white text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-white">3</span>
      </button>
    </div>
    <div class="flex items-center gap-2 mt-3">
      <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, var(--brand-600), var(--brand-800)); box-shadow: 0 2px 6px -2px rgba(14,58,117,.5);">
        <svg viewBox="0 0 24 24" fill="none" class="w-[18px] h-[18px]" aria-hidden="true">
          <path d="M10 4h4v6h6v4h-6v6h-4v-6H4v-4h6z" fill="#fff"/>
        </svg>
      </div>
      <div>
        <div class="text-[13px] font-semibold text-[var(--ink-900)] leading-tight">MusterKasse</div>
        <div class="text-[10.5px] text-[var(--ink-500)] leading-tight">Ihre Online-Geschäftsstelle</div>
      </div>
    </div>
  </header>

  <!-- Toasts -->
  <div class="toast-wrap" id="toasts"></div>

  <!-- Notification dropdown (hidden) -->
  <div id="notifPop" class="notif-pop hidden">
    <div class="px-4 py-3 border-b border-[var(--ink-100)] flex items-center justify-between">
      <div class="font-semibold text-[14px]">Benachrichtigungen</div>
      <button id="closeNotif" class="text-[var(--ink-500)] hover:text-[var(--ink-900)]"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div class="overflow-y-auto" style="max-height: 300px;" id="notifList"></div>
  </div>

  <!-- Versicherten-Switcher (für Demo) -->
  <div id="versSwitcherPop" class="vers-switcher-pop hidden">
    <div class="px-4 py-3 border-b border-[var(--ink-100)]">
      <div class="font-semibold text-[14px]">Versicherter wechseln</div>
      <div class="text-[11px] text-[var(--ink-500)] mt-0.5">Demo-Funktion</div>
    </div>
    <div class="overflow-y-auto" style="max-height: 340px;" id="versSwitcherList"></div>
  </div>

  <!-- Main views -->
  <section class="app-content" id="content"></section>

  <!-- Bottom tab bar -->
  <nav class="tab-bar" role="tablist">
    <button class="tab-btn active" data-tab="home"><i data-lucide="home" class="w-5 h-5"></i>Start</button>
    <button class="tab-btn" data-tab="antraege"><i data-lucide="file-text" class="w-5 h-5"></i>Anträge</button>
    <button class="tab-btn relative" data-tab="postfach">
      <i data-lucide="mail" class="w-5 h-5"></i>Postfach
      <span class="badge" id="postfachBadge">2</span>
    </button>
    <button class="tab-btn" data-tab="familie"><i data-lucide="users" class="w-5 h-5"></i>Familie</button>
    <button class="tab-btn" data-tab="profil"><i data-lucide="user-round" class="w-5 h-5"></i>Profil</button>
  </nav>

  <!-- Sheet container -->
  <div id="sheetHost"></div>
</main>

<script>
/* =========================================================
   Inline Icon Renderer (Lucide-kompatibel)
   ========================================================= */

const LUCIDE_PATHS = {
  "award": `<path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526" /><circle cx="12" cy="8" r="6" />`,

const LUCIDE_ALIASES = { 'home': 'house' };

window.lucide = {
  createIcons(opts) {
    const root = (opts && opts.root) || document;
    const nodes = root.querySelectorAll('[data-lucide]');
    nodes.forEach(el => {
      const raw = el.getAttribute('data-lucide');
      const name = LUCIDE_ALIASES[raw] || raw;
      const inner = LUCIDE_PATHS[name];
      if (!inner) {
        console.warn('Icon fehlt:', raw);
        return;
      }
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      svg.setAttribute('viewBox', '0 0 24 24');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'currentColor');
      svg.setAttribute('stroke-width', '2');
      svg.setAttribute('stroke-linecap', 'round');
      svg.setAttribute('stroke-linejoin', 'round');
      svg.setAttribute('aria-hidden', 'true');
      // Klassen vom Original übernehmen + lucide-spezifisch
      const origClass = el.getAttribute('class') || '';
      svg.setAttribute('class', ('lucide lucide-' + name + ' ' + origClass).trim());
      svg.innerHTML = inner;
      el.replaceWith(svg);
    });
  }
};

  },

  async loadFamilie(versicherter_id) {
    const { data, error } = await sb.from(T.familie)
      .select('*').eq('versicherter_id', versicherter_id).order('geburtsdatum');
    if (error) throw error;
    return data;
  },

  async loadAntraege(versicherter_id) {
    const { data, error } = await sb.from(T.antraege)
      .select('*').eq('versicherter_id', versicherter_id).order('created_at', { ascending: false });
    if (error) throw error;
    return data;
  },

  async loadTimeline(antrag_id) {
    const { data, error } = await sb.from(T.timeline)
      .select('*').eq('antrag_id', antrag_id).order('sortierung');
    if (error) throw error;
    return data;
  },

  async loadNachrichten(versicherter_id) {
    const { data, error } = await sb.from(T.nachrichten)
      .select('*').eq('versicherter_id', versicherter_id).order('datum', { ascending: false });
    if (error) throw error;
    return data;
  },

  async insertAntrag({ versicherter_id, typ, betreff, beschreibung }) {
    const heute = new Date().toISOString().slice(0,10);
    const { data: antrag, error } = await sb.from(T.antraege).insert({
      versicherter_id, typ, betreff, beschreibung,
      eingereicht_am: heute, status: 'Eingegangen'
    }).select().single();
    if (error) throw error;

    // Default-Timeline anlegen
    const heuteDE = heute.split('-').reverse().join('.');
    await sb.from(T.timeline).insert([
      { antrag_id: antrag.id, datum: heuteDE, text: 'Antrag eingegangen',       status: 'current', sortierung: 1 },
      { antrag_id: antrag.id, datum: '—',     text: 'Unterlagen werden geprüft', status: 'pending', sortierung: 2 },
      { antrag_id: antrag.id, datum: '—',     text: 'Entscheidung & Rückmeldung',status: 'pending', sortierung: 3 }
    ]);
    return antrag;
  },

  async markNachrichtGelesen(id) {
    const { error } = await sb.from(T.nachrichten).update({ gelesen: true }).eq('id', id);
    if (error) throw error;
  },

  async uploadAU({ versicherter_id, person_name, au_beginn, au_ende, file }) {
    // Datei in Storage hochladen
    const ext       = (file.name.split('.').pop() || 'bin').toLowerCase();
    const safeName  = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const storage_pfad = `${versicherter_id}/${Date.now()}_${safeName}`;
    const { error: upErr } = await sb.storage.from(BUCKET).upload(storage_pfad, file, {
      cacheControl: '3600', upsert: false, contentType: file.type || 'application/octet-stream'
    });
    if (upErr) throw upErr;

    // Metadaten in DB
    const { data, error } = await sb.from(T.au_uploads).insert({
      versicherter_id, person_name,
      au_beginn: au_beginn || null,
      au_ende:   au_ende   || null,
      dateiname: file.name,
      storage_pfad,
      datei_groesse: file.size,
      mime_type: file.type
    }).select().single();
    if (error) throw error;
    return data;
  },

  async updateVersicherter(id, patch) {
    const { error } = await sb.from(T.versicherte).update(patch).eq('id', id);
    if (error) throw error;
  },

  async addFamilie({ versicherter_id, name, rolle, geburtsdatum, status }) {
    const { error } = await sb.from(T.familie).insert({ versicherter_id, name, rolle, geburtsdatum, status });
    if (error) throw error;
  }
};

/* Datum von DE "TT.MM.JJJJ" zu ISO "JJJJ-MM-TT" */
function deToISO(s) {
  if (!s) return null;
  const m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if (!m) return null;
  return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
}
/* Datum von ISO zu DE */
function isoToDE(s) {
  if (!s) return '';
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[3]}.${m[2]}.${m[1]}` : s;
}

/* ---------- Daten aus Supabase in den State laden ---------- */
async function ladeAllesFuerVersicherten(id) {
  state.loading = true;
  try {
    const [v, fam, antraegeRaw, nachrichten] = await Promise.all([
      api.loadVersicherter(id),
      api.loadFamilie(id),
      api.loadAntraege(id),
      api.loadNachrichten(id)
    ]);

    // User-Struktur in das Format bringen, das die App erwartet
    state.user = {
      id:                  v.id,
      anrede:              v.anrede,
      vorname:             v.vorname,
      nachname:            v.nachname,
      geburtsdatum:        isoToDE(v.geburtsdatum),
      versichertennummer:  v.versichertennummer,
      kassennummer:        v.kassennummer,
      gueltigBis:          v.gueltig_bis,
      adresse: { strasse: v.strasse || '', plz: v.plz || '', ort: v.ort || '' },
      email:               v.email || '',
      telefon:             v.telefon || '',
      iban:                v.iban || '',
      mitgliedSeit:        v.mitglied_seit,
      twoFA: true, sprache: 'Deutsch', benachrichtigungen: true
    };

    // Familie: Stammversicherter + Familienmitglieder
    const initialen = (name) => {
      const p = String(name || '').trim().split(' ').filter(Boolean);
      return (p[0]?.[0] || '?') + (p[p.length-1]?.[0] || '');
    };
    state.familie = [
      {
        id: 'stamm-' + v.id,
        rolle: 'Stammversicherter',
        name: `${v.vorname} ${v.nachname}`,
        geburt: isoToDE(v.geburtsdatum),
        status: 'Pflichtversichert',
        avatar: initialen(`${v.vorname} ${v.nachname}`).toUpperCase()
      },
      ...fam.map(f => ({
        id: f.id,
        rolle: f.rolle,
        name: f.name,
        geburt: isoToDE(f.geburtsdatum),
        status: f.status,
        avatar: initialen(f.name).toUpperCase()
      }))
    ];

    // Anträge mit Timeline parallel laden
    const antraegeMitTimeline = await Promise.all(antraegeRaw.map(async a => {
      const tl = await api.loadTimeline(a.id);
      return {
        id: a.id,
        typ: a.typ,
        betreff: a.betreff,
        datum: isoToDE(a.eingereicht_am),
        status: a.status,
        timeline: tl.map(t => ({
          t: t.datum,
          text: t.text,
          done:    t.status === 'done',
          current: t.status === 'current'
        }))
      };
    }));
    state.antraege = antraegeMitTimeline;

    // Nachrichten
    state.postfach = nachrichten.map(n => ({
      id: n.id,
      betreff: n.betreff,
      absender: n.absender,
      datum: isoToDE(n.datum),
      gelesen: n.gelesen,
      wichtig: n.wichtig,
      text: n.text,
      anhang: n.anhang_name
    }));

    state.aktiveVersicherterId = id;
  } catch (e) {
    console.error('Fehler beim Laden:', e);
    toast('Daten konnten nicht geladen werden: ' + (e.message || e), 'warn');
  } finally {
    state.loading = false;
  }
}


/* ---------- Utility ---------- */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

function escapeHTML(str='') {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function statusChip(status) {
  const map = {
    'Eingegangen':    'chip-blue',
    'In Bearbeitung': 'chip-amber',
    'Erledigt':       'chip-green',
    'Abgelehnt':      'chip-rose'
  };
  const icon = {
    'Eingegangen':    'inbox',
    'In Bearbeitung': 'loader-circle',
    'Erledigt':       'circle-check',
    'Abgelehnt':      'circle-x'
  }[status] || 'circle';
  return `<span class="chip ${map[status]||'chip-gray'}"><i data-lucide="${icon}" class="w-3 h-3"></i>${status}</span>`;
}

function toast(msg, type='success') {
  const host = $('#toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const ico = type === 'success' ? 'circle-check'
            : type === 'warn'    ? 'triangle-alert'
            : 'info';
  el.innerHTML = `<i data-lucide="${ico}" class="w-4 h-4"></i><span>${escapeHTML(msg)}</span>`;
  host.appendChild(el);
  lucide.createIcons();
  setTimeout(()=> {
    el.style.transition = 'opacity .25s, transform .25s';
    el.style.opacity = '0';
    el.style.transform = 'translateY(-6px)';
    setTimeout(()=> el.remove(), 260);
  }, 2400);
}

function updateBadges() {
  const ungelesen = state.postfach.filter(n => !n.gelesen).length;
  const badge = $('#postfachBadge');
  if (ungelesen > 0) {
    badge.textContent = ungelesen;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
  const notifBadge = $('#notifBadge');
  if (state.notifications.length > 0) {
    notifBadge.textContent = state.notifications.length;
    notifBadge.style.display = '';
  } else {
    notifBadge.style.display = 'none';
  }
}

/* ---------- Sheet (Modal) ---------- */
function openSheet(contentHTML, options={}) {
  const host = $('#sheetHost');
  host.innerHTML = `
    <div class="sheet-backdrop" id="sheetBackdrop">
      <div class="sheet" role="dialog" aria-modal="true">
        <div class="sheet-handle"></div>
        ${contentHTML}
      </div>
    </div>`;
  lucide.createIcons();
  $('#sheetBackdrop').addEventListener('click', (e) => {
    if (e.target.id === 'sheetBackdrop') closeSheet();
  });
  if (options.onOpen) options.onOpen();
}

function onAUFileSelected(ev) {
  const file = ev.target.files?.[0];
  if (!file) return;
  const lbl = document.getElementById('auFileLabel');
  const kb = (file.size / 1024).toFixed(0);
  if (lbl) lbl.textContent = `${file.name} (${kb} KB)`;
}

async function submitAU(ev) {
  ev.preventDefault();
  const form = ev.target;
  const file = form.datei.files?.[0];
  if (!file) { toast('Bitte eine Datei auswählen','warn'); return false; }

  const submitBtn = form.querySelector('button[type="submit"]');
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.6';
    submitBtn.innerHTML = '<span>Lädt hoch …</span>';
  }

  try {
    await api.uploadAU({
      versicherter_id: state.aktiveVersicherterId,
      person_name: form.person.value,
      au_beginn: deToISO(form.von.value),
      au_ende:   deToISO(form.bis.value),
      file
    });
    closeSheet();
    toast('AU-Bescheinigung übermittelt','success');
  } catch (e) {
    console.error(e);
    toast('Upload fehlgeschlagen: ' + (e.message || e), 'warn');
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.style.opacity = '';
      submitBtn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> Hochladen';
      lucide.createIcons();
    }
  }
  return false;
}

async function submitAntrag(ev) {
  ev.preventDefault();
  const form = ev.target;
  const typ      = form.dataset.typ || 'Sonstiges';
  const betreff  = form.betreff.value.trim()  || '(ohne Betreff)';

  // Submit-Button deaktivieren, damit man nicht doppelt klickt
  const submitBtn = form.querySelector('button[type="submit"]');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.style.opacity = '0.6'; }

  try {
    const antrag = await api.insertAntrag({
      versicherter_id: state.aktiveVersicherterId,
      typ, betreff,
      beschreibung: form.beschreibung?.value || null
    });

    // Neu geladenen Antrag direkt in den State schieben (ohne Reload)
    state.antraege.unshift({
      id: antrag.id,
      typ: antrag.typ,
      betreff: antrag.betreff,
      datum: isoToDE(antrag.eingereicht_am),
      status: 'Eingegangen',
      timeline: [
        { t: isoToDE(antrag.eingereicht_am), text: 'Antrag eingegangen', current: true },
        { t: '—', text: 'Unterlagen werden geprüft' },
        { t: '—', text: 'Entscheidung & Rückmeldung' }
      ]
    });

    closeSheet();
    toast('Antrag erfolgreich eingereicht', 'success');
    state.activeTab = 'antraege';
    render();
  } catch (e) {
    console.error(e);
    toast('Fehler beim Einreichen: ' + (e.message || e), 'warn');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.style.opacity = ''; }
  }
  return false;
}

    $('#versSwitcherList').innerHTML = state.versicherteList.map((v, idx) => {
      const colors = palettes[idx % palettes.length];
      const isActive = v.id === state.aktiveVersicherterId;
      const initials = (v.vorname[0] || '') + (v.nachname[0] || '');
      return `
        <button class="vers-switcher-item ${isActive?'active':''}" onclick="wechsleVersicherter('${v.id}')">
          <div class="mini-avatar" style="background: linear-gradient(135deg, ${colors[0]} 0%, ${colors[1]} 100%);">${initials}</div>

    }).join('');
    lucide.createIcons();
  } else {
    pop.classList.add('hidden');
  }
}

async function wechsleVersicherter(id) {
  if (id === state.aktiveVersicherterId) { toggleVersSwitcher(); return; }
  state.ui.versSwitcherOffen = false;
  $('#versSwitcherPop').classList.add('hidden');
  showLoadingOverlay(true);
  await ladeAllesFuerVersicherten(id);
  setupRealtime();
  showLoadingOverlay(false);
  state.activeTab = 'home';
  $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'home'));
  updateUserHeader();
  render();
  toast(`Gewechselt zu ${state.user.vorname} ${state.user.nachname}`, 'info');
}

function updateUserHeader() {
  const el = $('#userName');
  if (el && state.user) {
    el.innerHTML = `${escapeHTML(state.user.vorname)} <span class="italic text-[var(--brand-700)]">${escapeHTML(state.user.nachname)}</span>`;

function showLoadingOverlay(show) {
  let ov = $('#loadingOverlay');
  if (show) {
    if (!ov) {
      ov = document.createElement('div');
      ov.id = 'loadingOverlay';
      ov.className = 'loading-overlay';
      ov.innerHTML = `
        <div class="loading-spinner"></div>
        <div class="text-[13px] text-[var(--ink-700)] font-medium">Daten werden geladen …</div>
      `;
      $('#app').appendChild(ov);
    }
  } else {
    if (ov) ov.remove();
  }
}

/* ---------- Render orchestrator ---------- */
let realtimeChannel = null;
let realtimeReloadTimer = null;

function setupRealtime() {
  if (realtimeChannel) {
    sb.removeChannel(realtimeChannel);
  }
  const vid = state.aktiveVersicherterId;
  realtimeChannel = sb.channel('musterkasse-app-' + vid);

  // Auf Tabellen horchen, die den aktuellen Versicherten betreffen könnten
  ['mk_antraege','mk_antrag_timeline','mk_nachrichten','mk_au_uploads','mk_familienmitglieder','mk_versicherte']
    .forEach(table => {
      realtimeChannel.on('postgres_changes',
        { event: '*', schema: 'public', table },
        payload => {
          // Nur neu laden, wenn es den aktuellen Versicherten betrifft (falls payload Info hat)
          const rec = payload.new || payload.old || {};
          // Timeline-Events haben keinen versicherter_id, aber antrag_id -> immer reagieren
          // Alle anderen: nur wenn versicherter_id passt
          if (rec.versicherter_id && rec.versicherter_id !== vid && table !== 'mk_antrag_timeline') return;
          scheduleReload();
        }
      );
    });

  realtimeChannel.subscribe(status => {
    console.log('[Realtime App]', status);
  });
}

function scheduleReload() {
  clearTimeout(realtimeReloadTimer);
  realtimeReloadTimer = setTimeout(async () => {
    try {
      showRealtimePulse();
      await ladeAllesFuerVersicherten(state.aktiveVersicherterId);
      render(true); // scroll behalten
    } catch (e) { console.warn('Realtime-Reload fehlgeschlagen:', e); }
  }, 300);
}

function showRealtimePulse() {
  const existing = document.getElementById('rtPulse');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'rtPulse';
  el.style.cssText = 'position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:75;background:var(--sage-600);color:#fff;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:99px;box-shadow:0 4px 12px -4px rgba(0,0,0,.2);animation:pulse-in .2s ease-out;';
  el.textContent = '● Live-Update';
  document.querySelector('#app').appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity .3s, transform .3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) translateY(-4px)';
    setTimeout(() => el.remove(), 300);
  }, 1800);
}

function render(keepScroll=false) {
  const c = $('#content');
  const prevScroll = c.scrollTop;
  let html = '';
  switch (state.activeTab) {
    case 'home':     html = renderHome(); break;
    case 'antraege': html = renderAntraege(); break;
    case 'postfach': html = renderPostfach(); break;
    case 'familie':  html = renderFamilie(); break;
    case 'profil':   html = renderProfil(); break;
  }
  c.innerHTML = html;
  lucide.createIcons();
  updateBadges();
  c.scrollTop = keepScroll ? prevScroll : 0;
}

/* ---------- Init ---------- */
async function init() {
  // Clock
  const setClock = () => {
    const d = new Date();
    $('#clock').textContent = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  };
  setClock(); setInterval(setClock, 30000);

  // Tab bar listeners
  $$('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

  // Notification
  $('#notifBtn').addEventListener('click', toggleNotifPop);

  // Close popovers on outside click
  document.addEventListener('click', (e) => {
    if (state.ui.notifOffen) {
      const pop = $('#notifPop');
      const btn = $('#notifBtn');
      if (!pop.contains(e.target) && !btn.contains(e.target)) {
        state.ui.notifOffen = false;
        pop.classList.add('hidden');
      }
    }
    if (state.ui.versSwitcherOffen) {
      const pop = $('#versSwitcherPop');
      const btn = $('#userSwitcher');
      if (!pop.contains(e.target) && !btn.contains(e.target)) {
        state.ui.versSwitcherOffen = false;
        pop.classList.add('hidden');
      }
    }
  });

  // Icons für initiales Markup rendern
  lucide.createIcons();

  // Daten laden
  showLoadingOverlay(true);
  try {
    state.versicherteList = await api.listVersicherte();
    if (state.versicherteList.length === 0) {
      throw new Error('Keine Versicherten gefunden. Läuft das Seed-SQL?');
    }
    // Max als Default, falls vorhanden, sonst der Erste
    const max = state.versicherteList.find(v => v.id === state.aktiveVersicherterId);
    const startId = max ? max.id : state.versicherteList[0].id;
    await ladeAllesFuerVersicherten(startId);
    setupRealtime();
    updateUserHeader();
    render();
  } catch (e) {
    console.error(e);
    $('#content').innerHTML = `
      <div class="p-8 text-center">
        <i data-lucide="triangle-alert" class="w-10 h-10 mx-auto text-[var(--rose-600)]"></i>
        <div class="mt-3 font-semibold text-[15px]">Verbindung fehlgeschlagen</div>
        <div class="mt-1 text-[12.5px] text-[var(--ink-500)]">${escapeHTML(e.message || String(e))}</div>
        <div class="mt-3 text-[11px] text-[var(--ink-400)]">Prüfen Sie die Supabase-URL, den anon-Key und ob das SQL-Schema ausgeführt wurde.</div>
      </div>`;
    lucide.createIcons();
  } finally {
    showLoadingOverlay(false);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
